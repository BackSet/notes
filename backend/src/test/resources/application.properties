spring.application.name=backend-test

# Use H2 in-memory database for tests
spring.datasource.url=jdbc:h2:mem:testdb;DB_CLOSE_DELAY=-1;MODE=PostgreSQL
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

# JPA/Hibernate
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.show-sql=false

# Disable Flyway in tests to keep test context loading fast and independent of database migrations
spring.flyway.enabled=false

# JWT configuration for tests (non-secret, test-only key >= 256 bits)
app.jwt.secret=test-secret-test-secret-test-secret-test-secret-0123456789
app.jwt.access-expiration-ms=900000
app.jwt.refresh-expiration-ms=604800000
