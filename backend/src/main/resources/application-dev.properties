# Database Configuration (Development)
spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/notes}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:postgres}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:postgres}

# JPA / Hibernate Configuration (Development)
spring.jpa.hibernate.ddl-auto=validate

# Flyway Migration Configuration (Development)
spring.flyway.enabled=true
spring.flyway.baseline-on-migrate=true

# Springdoc & Scalar Configuration (Development)
springdoc.api-docs.enabled=true
springdoc.swagger-ui.enabled=false
scalar.enabled=true
scalar.url=/v3/api-docs
scalar.path=/docs
