spring.application.name=backend
spring.profiles.active=${SPRING_PROFILES_ACTIVE:dev}
spring.config.import=optional:file:.env[.properties]
server.port=${PORT:8080}

# Common Database Configuration
spring.datasource.driver-class-name=org.postgresql.Driver

# Common JPA / Hibernate Configuration
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

# Common Actuator Endpoints Configuration
management.endpoints.web.exposure.include=health,info,prometheus

# Custom App Security & CORS Configuration
# JWT_SECRET must be at least 256 bits (32 bytes) for HMAC-SHA256.
app.jwt.secret=${JWT_SECRET:CHANGE_ME_MUST_BE_AT_LEAST_256_BITS_LONG_FOR_HMAC_SHA_256}
# Access token is short-lived (default 15 min); refresh token is long-lived (default 7 days).
app.jwt.access-expiration-ms=${JWT_EXPIRATION_MS:900000}
app.jwt.refresh-expiration-ms=${JWT_REFRESH_EXPIRATION_MS:604800000}
app.cors.allowed-origins=${CORS_ALLOWED_ORIGINS:http://localhost:5173}

# Initial Admin Bootstrap (disabled by default; never commit real credentials)
app.initial-admin.enabled=${INITIAL_ADMIN_ENABLED:false}
app.initial-admin.update-existing=${INITIAL_ADMIN_UPDATE_EXISTING:false}
app.initial-admin.email=${INITIAL_ADMIN_EMAIL:}
app.initial-admin.username=${INITIAL_ADMIN_USERNAME:}
app.initial-admin.password=${INITIAL_ADMIN_PASSWORD:}
